name: 🚀 Despliegue Automático a InfinityFree

on:
  push:
    branches:
      - main  # Si tu rama principal se llama master, cambia 'main' por 'master'

jobs:
  web-deploy:
    name: 🎉 Sincronizando Servidor
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Obteniendo código actualizado
      uses: actions/checkout@v3
    
    - name: 📂 Subiendo archivos vía FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./
        server-dir: htdocs/
